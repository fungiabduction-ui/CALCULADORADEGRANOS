<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ CONFIG - Biblioteca de Ingredientes</title>
    <link rel="stylesheet" href="gr_styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <h1>⚙️ CONFIG - Biblioteca de Ingredientes</h1>
            <p class="subtitle">Gestión de biblioteca de ingredientes</p>
            <div class="header-actions">
                <button type="button" class="btn btn-secondary" onclick="goToIndex()">✕ Cerrar</button>
            </div>
        </header>

        <!-- CONFIG - Biblioteca de Ingredientes -->
        <section class="section-card active">
            <div class="section-header" data-section="config">
                <h2>⚙️ Biblioteca de Ingredientes</h2>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="section-content" id="config">
                <!-- Tabs de navegación -->
                <div class="config-tabs">
                    <button type="button" class="config-tab active" data-tab="agentes" onclick="mostrarPanelConfig('agentes')">Agentes</button>
                    <button type="button" class="config-tab" data-tab="aditivos" onclick="mostrarPanelConfig('aditivos')">Aditivos</button>
                    <button type="button" class="config-tab" data-tab="granos" onclick="mostrarPanelConfig('granos')">Granos</button>
                    <button type="button" id="btnEditBiblioteca" class="config-tab" onclick="toggleEdicionBiblioteca()">Edit</button>
                </div>
                
                <!-- Panel Agentes -->
                <div class="config-panel active" id="panel-agentes">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre del Agente</label>
                            <input type="text" id="configAgenteNombre" placeholder="Ej: Ácido peracético">
                        </div>
                        <div class="form-group">
                            <label>Concentración (%)</label>
                            <input type="number" id="configAgenteConc" value="0" min="0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Volumen típico (ml)</label>
                            <input type="number" id="configAgenteVol" value="0" min="0" step="1">
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label>Notas</label>
                        <input type="text" id="configAgenteNotas" placeholder="Notas adicionales...">
                    </div>
                    <button type="button" class="btn btn-primary" onclick="guardarAgenteConfig()">+ Agregar Agente</button>
                    
                    <h4 class="config-list-title">Agentes registrados:</h4>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Conc. %</th>
                                <th>Volumen ml</th>
                                <th>Notas</th>
                                <th class="col-editar"></th>
                            </tr>
                        </thead>
                        <tbody id="configAgentesTable"></tbody>
                    </table>
                </div>
                
                <!-- Panel Aditivos -->
                <div class="config-panel" id="panel-aditivos">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre del Aditivo</label>
                            <input type="text" id="configAditivoNombre" placeholder="Ej: Yeso (CaSO4)">
                        </div>
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="configAditivoTipo">
                                <option value="Estructurante">Estructurante</option>
                                <option value="Corrector pH">Corrector pH</option>
                                <option value="Nutriente">Nutriente</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label>Notas</label>
                        <input type="text" id="configAditivoNotas" placeholder="Notas adicionales...">
                    </div>
                    <button type="button" class="btn btn-primary" onclick="guardarAditivoConfig()">+ Agregar Aditivo</button>
                    
                    <h4 class="config-list-title">Aditivos registrados:</h4>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Tipo</th>
                                <th>Notas</th>
                                <th class="col-editar"></th>
                            </tr>
                        </thead>
                        <tbody id="configAditivosTable"></tbody>
                    </table>
                </div>
                
                <!-- Panel Granos -->
                <div class="config-panel" id="panel-granos">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre del Grano</label>
                            <input type="text" id="configGranoNombre" placeholder="Ej: Avena (AV)">
                        </div>
                        <div class="form-group">
                            <label>Volumen muestra (ml)</label>
                            <input type="number" id="configGranoVolumen" value="0" min="0" step="1">
                        </div>
                        <div class="form-group">
                            <label>Peso muestra (g)</label>
                            <input type="number" id="configGranoPeso" value="0" min="0" step="0.1">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Densidad (g/ml) - AUTO</label>
                            <input type="number" id="configGranoDensidad" value="0" readonly>
                        </div>
                        <div class="form-group">
                            <label>Granulometría (mm)</label>
                            <input type="text" id="configGranoGranulo" placeholder="Ej: 2-3mm">
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label>Notas</label>
                        <input type="text" id="configGranoNotas" placeholder="Notas adicionales...">
                    </div>
                    <button type="button" class="btn btn-primary" onclick="guardarGranoConfig()">+ Agregar Grano</button>
                    
                    <h4 class="config-list-title">Granos registrados:</h4>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Densidad</th>
                                <th>Granulometría</th>
                                <th>Notas</th>
                                <th class="col-editar"></th>
                            </tr>
                        </thead>
                        <tbody id="configGranosTable"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        const BIBLIOTECA_KEY = 'sustratos_biblioteca';
        
        let biblioteca = {
            agentes: [],
            aditivos: [],
            granos: []
        };
        
        let modoEdicion = false;

        document.addEventListener('DOMContentLoaded', function() {
            cargarBiblioteca();
            inicializarEventos();
            renderizarBibliotecaEnConfig();
            
            document.getElementById('configGranoVolumen').addEventListener('input', calcDensidadGrano);
            document.getElementById('configGranoPeso').addEventListener('input', calcDensidadGrano);
        });

        function cargarBiblioteca() {
            const stored = localStorage.getItem(BIBLIOTECA_KEY);
            if (stored) {
                biblioteca = JSON.parse(stored);
            } else {
                biblioteca = {
                    agentes: [
                        { id: 'AG-01', nombre: 'ÁCIDO PERACÉTICO', concDefault: 5, volumenTipico: 30, notas: 'Descontaminante oxidativo' },
                        { id: 'AG-02', nombre: 'HIPOCLORITO DE SODIO', concDefault: 1, volumenTipico: 50, notas: 'Blanqueador disinfectante' },
                        { id: 'AG-03', nombre: 'PERÓXIDO DE HIDRÓGENO', concDefault: 3, volumenTipico: 40, notas: 'Oxidante fuerte' }
                    ],
                    aditivos: [
                        { id: 'AD-01', nombre: 'CaSO4 (Yeso)', tipo: 'Estructurante', notas: 'Mejora aireación' },
                        { id: 'AD-02', nombre: 'Carbonato de Calcio', tipo: 'Corrector pH', notas: 'Alcalinizante' },
                        { id: 'AD-03', nombre: 'Gesso', tipo: 'Estructurante', notas: 'Similar al yeso' },
                        { id: 'AD-04', nombre: 'Tiza', tipo: 'Estructurante', notas: 'Fuente de calcio' }
                    ],
                    granos: [
                        { id: 'GR-01', nombre: 'Avena (AV)', densidadTipica: 0.556, granulometria: '', notas: 'Grano fino, alta superficie' },
                        { id: 'GR-02', nombre: 'Maíz (MA)', densidadTipica: 0.802, granulometria: '', notas: 'Grano grueso' },
                        { id: 'GR-03', nombre: 'Trigo (TR)', densidadTipica: 0.750, granulometria: '', notas: 'Grano medio' },
                        { id: 'GR-04', nombre: 'Centeno (CE)', densidadTipica: 0.700, granulometria: '', notas: 'Grano medio' },
                        { id: 'GR-05', nombre: 'Sorgo (SO)', densidadTipica: 0.750, granulometria: '', notas: 'Grano medio' }
                    ]
                };
                guardarBibliotecaEnStorage();
            }
        }

        function guardarBibliotecaEnStorage() {
            // Recolectar valores editados
            document.querySelectorAll('#configAgentesTable tr').forEach((tr, i) => {
                if (biblioteca.agentes[i]) {
                    const nombreInput = tr.querySelector('.edit-nombre');
                    const concInput = tr.querySelector('.edit-conc');
                    if (nombreInput) biblioteca.agentes[i].nombre = nombreInput.value;
                    if (concInput) biblioteca.agentes[i].concDefault = parseFloat(concInput.value) || 0;
                }
            });
            
            document.querySelectorAll('#configAditivosTable tr').forEach((tr, i) => {
                if (biblioteca.aditivos[i]) {
                    const nombreInput = tr.querySelector('.edit-nombre');
                    const tipoInput = tr.querySelector('.edit-tipo');
                    if (nombreInput) biblioteca.aditivos[i].nombre = nombreInput.value;
                    if (tipoInput) biblioteca.aditivos[i].tipo = tipoInput.value;
                }
            });
            
            document.querySelectorAll('#configGranosTable tr').forEach((tr, i) => {
                if (biblioteca.granos[i]) {
                    const nombreInput = tr.querySelector('.edit-nombre');
                    const densidadInput = tr.querySelector('.edit-densidad');
                    const granuloInput = tr.querySelector('.edit-granulo');
                    if (nombreInput) biblioteca.granos[i].nombre = nombreInput.value;
                    if (densidadInput) biblioteca.granos[i].densidadTipica = parseFloat(densidadInput.value) || 0;
                    if (granuloInput) biblioteca.granos[i].granulometria = granuloInput.value;
                }
            });
            
            localStorage.setItem(BIBLIOTECA_KEY, JSON.stringify(biblioteca));
            
            // Notificar a ventana principal
            window.parent.postMessage({ type: 'bibliotecaActualizada' }, '*');
        }

        function inicializarEventos() {
            document.querySelectorAll('.section-header').forEach(header => {
                header.addEventListener('click', function() {
                    this.parentElement.classList.toggle('collapsed');
                });
            });
            
            // Tabs
            document.querySelectorAll('.config-tab[data-tab]').forEach(tab => {
                tab.addEventListener('click', function() {
                    mostrarPanelConfig(this.dataset.tab);
                });
            });
        }

        function mostrarPanelConfig(tab) {
            document.querySelectorAll('.config-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.config-tab[data-tab="${tab}"]`).classList.add('active');
            
            document.querySelectorAll('.config-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
        }

        function calcDensidadGrano() {
            const vol = parseFloat(document.getElementById('configGranoVolumen').value) || 0;
            const peso = parseFloat(document.getElementById('configGranoPeso').value) || 0;
            document.getElementById('configGranoDensidad').value = vol > 0 ? (peso / vol).toFixed(3) : 0;
        }

        function renderizarBibliotecaEnConfig() {
            // Agentes
            const tbodyAgentes = document.getElementById('configAgentesTable');
            tbodyAgentes.innerHTML = biblioteca.agentes.map((ag, i) => {
                if (modoEdicion) {
                    return `<tr>
                        <td>${ag.id}</td>
                        <td><input type="text" class="edit-nombre" data-tipo="agentes" data-idx="${i}" value="${ag.nombre}"></td>
                        <td><input type="number" class="edit-conc" data-tipo="agentes" data-idx="${i}" value="${ag.concDefault}" step="0.1"></td>
                        <td>${ag.volumenTipico || '-'}</td>
                        <td>${ag.notas || ''}</td>
                        <td class="col-editar"><button type="button" class="btn-delete" onclick="eliminarIngredienteConfig('agentes', ${i})">✕</button></td>
                    </tr>`;
                } else {
                    return `<tr>
                        <td>${ag.id}</td>
                        <td>${ag.nombre}</td>
                        <td>${ag.concDefault}</td>
                        <td>${ag.volumenTipico || '-'}</td>
                        <td>${ag.notas || ''}</td>
                        <td class="col-editar"></td>
                    </tr>`;
                }
            }).join('');
            
            // Aditivos
            const tbodyAditivos = document.getElementById('configAditivosTable');
            tbodyAditivos.innerHTML = biblioteca.aditivos.map((ad, i) => {
                if (modoEdicion) {
                    return `<tr>
                        <td>${ad.id}</td>
                        <td><input type="text" class="edit-nombre" data-tipo="aditivos" data-idx="${i}" value="${ad.nombre}"></td>
                        <td><select class="edit-tipo" data-tipo="aditivos" data-idx="${i}">
                            <option value="Estructurante" ${ad.tipo === 'Estructurante' ? 'selected' : ''}>Estructurante</option>
                            <option value="Corrector pH" ${ad.tipo === 'Corrector pH' ? 'selected' : ''}>Corrector pH</option>
                            <option value="Nutriente" ${ad.tipo === 'Nutriente' ? 'selected' : ''}>Nutriente</option>
                        </select></td>
                        <td>${ad.notas || ''}</td>
                        <td class="col-editar"><button type="button" class="btn-delete" onclick="eliminarIngredienteConfig('aditivos', ${i})">✕</button></td>
                    </tr>`;
                } else {
                    return `<tr>
                        <td>${ad.id}</td>
                        <td>${ad.nombre}</td>
                        <td>${ad.tipo}</td>
                        <td>${ad.notas || ''}</td>
                        <td class="col-editar"></td>
                    </tr>`;
                }
            }).join('');
            
            // Granos
            const tbodyGranos = document.getElementById('configGranosTable');
            tbodyGranos.innerHTML = biblioteca.granos.map((gr, i) => {
                if (modoEdicion) {
                    return `<tr>
                        <td>${gr.id}</td>
                        <td><input type="text" class="edit-nombre" data-tipo="granos" data-idx="${i}" value="${gr.nombre}"></td>
                        <td><input type="number" class="edit-densidad" data-tipo="granos" data-idx="${i}" value="${gr.densidadTipica}" step="0.001" style="width:80px"></td>
                        <td><input type="text" class="edit-granulo" data-tipo="granos" data-idx="${i}" value="${gr.granulometria || ''}"></td>
                        <td>${gr.notas || ''}</td>
                        <td class="col-editar"><button type="button" class="btn-delete" onclick="eliminarIngredienteConfig('granos', ${i})">✕</button></td>
                    </tr>`;
                } else {
                    return `<tr>
                        <td>${gr.id}</td>
                        <td>${gr.nombre}</td>
                        <td>${gr.densidadTipica.toFixed(3).replace('.', ',')} g/ml</td>
                        <td>${gr.granulometria || ''}</td>
                        <td>${gr.notas || ''}</td>
                        <td class="col-editar"></td>
                    </tr>`;
                }
            }).join('');
            
            // Mostrar/ocultar columnas de edición
            const cols = document.querySelectorAll('.col-editar');
            cols.forEach(c => c.style.display = modoEdicion ? 'table-cell' : 'none');
        }

        window.toggleEdicionBiblioteca = function() {
            modoEdicion = !modoEdicion;
            const btn = document.getElementById('btnEditBiblioteca');
            btn.textContent = modoEdicion ? 'Save' : 'Edit';
            
            if (!modoEdicion) {
                guardarBibliotecaEnStorage();
            }
            
            renderizarBibliotecaEnConfig();
        };

        window.guardarAgenteConfig = function() {
            const nombre = document.getElementById('configAgenteNombre').value;
            const conc = parseFloat(document.getElementById('configAgenteConc').value) || 0;
            const vol = parseFloat(document.getElementById('configAgenteVol').value) || 0;
            const notas = document.getElementById('configAgenteNotas').value;
            
            if (!nombre) { alert('Ingrese nombre del agente'); return; }
            
            biblioteca.agentes.push({
                id: 'AG-' + String(biblioteca.agentes.length + 1).padStart(2, '0'),
                nombre: nombre.toUpperCase(), concDefault: conc, volumenTipico: vol, notas: notas
            });
            
            document.getElementById('configAgenteNombre').value = '';
            document.getElementById('configAgenteConc').value = 0;
            document.getElementById('configAgenteVol').value = 0;
            document.getElementById('configAgenteNotas').value = '';
            
            guardarBibliotecaEnStorage();
        };

        window.guardarAditivoConfig = function() {
            const nombre = document.getElementById('configAditivoNombre').value;
            const tipo = document.getElementById('configAditivoTipo').value;
            const notas = document.getElementById('configAditivoNotas').value;
            
            if (!nombre) { alert('Ingrese nombre del aditivo'); return; }
            
            biblioteca.aditivos.push({
                id: 'AD-' + String(biblioteca.aditivos.length + 1).padStart(2, '0'),
                nombre: nombre, tipo: tipo, notas: notas
            });
            
            document.getElementById('configAditivoNombre').value = '';
            document.getElementById('configAditivoTipo').value = 'Estructurante';
            document.getElementById('configAditivoNotas').value = '';
            
            guardarBibliotecaEnStorage();
        };

        window.guardarGranoConfig = function() {
            const nombre = document.getElementById('configGranoNombre').value;
            const vol = parseFloat(document.getElementById('configGranoVolumen').value) || 0;
            const peso = parseFloat(document.getElementById('configGranoPeso').value) || 0;
            const granulometria = document.getElementById('configGranoGranulo').value;
            const notas = document.getElementById('configGranoNotas').value;
            
            if (!nombre) { alert('Ingrese nombre del grano'); return; }
            
            const densidad = vol > 0 ? peso / vol : 0;
            
            biblioteca.granos.push({
                id: 'GR-' + String(biblioteca.granos.length + 1).padStart(2, '0'),
                nombre: nombre, densidadTipica: parseFloat(densidad.toFixed(3)), granulometria: granulometria, notas: notas
            });
            
            document.getElementById('configGranoNombre').value = '';
            document.getElementById('configGranoVolumen').value = 0;
            document.getElementById('configGranoPeso').value = 0;
            document.getElementById('configGranoDensidad').value = 0;
            document.getElementById('configGranoGranulo').value = '';
            document.getElementById('configGranoNotas').value = '';
            
            guardarBibliotecaEnStorage();
        };

        window.eliminarIngredienteConfig = function(tipo, index) {
            if (!confirm('¿Eliminar este ingrediente?')) return;
            biblioteca[tipo].splice(index, 1);
            guardarBibliotecaEnStorage();
        };
    </script>
</body>
</html>
